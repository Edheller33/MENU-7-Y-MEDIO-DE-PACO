<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b3d5c">
<meta name="description" content="Siete y Medio de Paco — Menú de referencia y comandero de órdenes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Siete y Medio de Paco</title>
<style>
:root{
  --navy:#0b3d5c;
  --navy-deep:#082a40;
  --teal:#0f6e8c;
  --teal-light:#12879e;
  --foam:#eef6f6;
  --sand:#faf6ee;
  --coral:#ff6b4a;
  --coral-deep:#e8532f;
  --ink:#0c1b22;
  --ink-soft:#4c6470;
  --line:#d7e6e6;
  --radius:18px;
  --shadow:0 6px 20px rgba(11,61,92,0.12);
  --shadow-lg:0 14px 34px rgba(11,61,92,0.22);
  --font-display:'Oswald',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--font-body), system-ui, sans-serif;
  background:linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
  color:var(--sand);
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
  overscroll-behavior-y:contain;
  -webkit-font-smoothing:antialiased;
}
.brand{
  text-align:center;
  margin-bottom:40px;
}
.brand .eyebrow{
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--teal-light);
  font-weight:600;
}
.brand h1{
  font-family:var(--font-display), system-ui, sans-serif;
  font-size:clamp(28px,7vw,40px);
  margin:6px 0 0;
  letter-spacing:.01em;
}
.cards{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.card{
  display:flex;
  align-items:center;
  gap:16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius);
  padding:20px;
  text-decoration:none;
  color:inherit;
  transition:transform .15s ease, background .15s ease;
}
.card:active{transform:scale(0.98);}
.card .icon{
  flex:0 0 auto;
  width:52px;height:52px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.card.menu .icon{background:rgba(15,110,140,0.35);}
.card.staff .icon{background:rgba(255,107,74,0.28);}
.card .text h2{
  margin:0 0 2px;
  font-size:18px;
  font-family:var(--font-display),system-ui,sans-serif;
  letter-spacing:.01em;
}
.card .text p{
  margin:0;
  font-size:13px;
  color:rgba(238,246,246,0.72);
}
.card .arrow{margin-left:auto;opacity:.55;font-size:20px;}
.card.menu:hover, .card.menu:focus-visible{background:rgba(15,110,140,0.18);}
.card.staff:hover, .card.staff:focus-visible{background:rgba(255,107,74,0.14);}
footer{
  margin-top:36px;
  font-size:11px;
  color:rgba(238,246,246,0.45);
  text-align:center;
}
</style>
</head>
<body>
  <div class="brand">
    <div class="eyebrow">Siete y Medio de Paco</div>
    <h1>¿Qué necesitas abrir?</h1>
  </div>

  <div class="cards">
    <a class="card menu" href="menu.html">
      <div class="icon">🍽️</div>
      <div class="text">
        <h2>Ver menú</h2>
        <p>Consulta rápida — uso personal</p>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card staff" href="comandero.html">
      <div class="icon">🧾</div>
      <div class="text">
        <h2>Comandero</h2>
        <p>Tomar órdenes de mesa</p>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <footer>Instala esta app para acceso rápido desde tu pantalla de inicio</footer>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
